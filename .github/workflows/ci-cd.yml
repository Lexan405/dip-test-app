name: CI/CD - Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: cr.yandex
  REPOSITORY: crp02431iecrj1ocprdq/dip-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Login to Yandex Cloud Container Registry
      run: |
        echo '${{ secrets.YC_SA_KEY }}' | docker login \
          --username json_key \
          --password-stdin ${{ env.REGISTRY }}

    - name: Build and push (main branch)
      if: github.ref == 'refs/heads/main'
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest .
        docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest

    - name: Build and push (tag)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        docker build -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${TAG} .
        docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${TAG}
        docker tag ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${TAG} ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest
        docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest
